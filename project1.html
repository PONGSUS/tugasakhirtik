    <style>

        body{

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#0b3b75;
        }

        table{
            border-collapse:collapse;

            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        th, td{
            border:1px solid #333;

        }

            text-align:center;
        }

        td{
            line-height:1.8;
        }

        .buttons{
            text-align:center;
            margin-top:25px;
        }

        button,
        a{
            padding:10px 18px;
            margin:0 5px;
            font-size:14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#0d57a1;
            color:white;
            text-decoration:none;
        }

        button:hover,
        a:hover{
            background:#083d74;
        }

        @media(max-width:768px){

            table{
                width:100%;
                font-size:14px;
            }

            th, td{
                padding:10px;
            }

        }

    </style>
