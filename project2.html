<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project 2 - Kalkulator</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .calculator{
            background:white;
            padding:30px;
            border-radius:15px;
            width:300px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            font-size:16px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
            margin-top:15px;
        }

        button{
            padding:12px;
            font-size:18px;
            border:none;
            background:#0d57a1;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#083d74;
        }

        .hasil{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .back{
            display:block;
            margin-top:20px;
            text-align:center;
            text-decoration:none;
            color:white;
            background:#333;
            padding:10px;
            border-radius:8px;
        }

    </style>
</head>
<body>

<div class="calculator">

    <h1>Kalkulator</h1>

    <input type="number" id="angka1" placeholder="Angka pertama">

    <input type="number" id="angka2" placeholder="Angka kedua">

    <div class="buttons">
        <button onclick="hitung('+')">+</button>
        <button onclick="hitung('-')">-</button>
        <button onclick="hitung('*')">*</button>
        <button onclick="hitung('/')">/</button>
    </div>

    <div class="hasil" id="hasil">
        Hasil: -
    </div>

    <a href="index.html" class="back">Kembali</a>

</div>

<script>

function hitung(operator){

    let a = parseFloat(document.getElementById("angka1").value);
    let b = parseFloat(document.getElementById("angka2").value);

    let hasil;

    if(operator == '+'){
        hasil = a + b;
    }

    else if(operator == '-'){
        hasil = a - b;
    }

    else if(operator == '*'){
        hasil = a * b;
    }

    else if(operator == '/'){
        hasil = a / b;
    }

    document.getElementById("hasil").innerHTML = "Hasil: " + hasil;
}

</script>

</body>
</html>
